<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お客様情報登録</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    label .required {
      color: #e74c3c;
      font-size: 12px;
      margin-left: 4px;
    }

    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s, background-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus {
      outline: none;
      border-color: #06C755;
      background: #fff;
    }

    input.error {
      border-color: #e74c3c;
      background: #fff5f5;
    }

    .error-message {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #06C755;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
      margin-top: 8px;
    }

    .submit-btn:active {
      background: #05a847;
    }

    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #eee;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      font-size: 14px;
      color: #888;
    }

    .complete {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .complete.show {
      display: block;
    }

    .complete-icon {
      width: 60px;
      height: 60px;
      background: #06C755;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .complete-icon svg {
      width: 30px;
      height: 30px;
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .complete h2 {
      font-size: 18px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .complete p {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    .error-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .error-screen.show {
      display: block;
    }

    .error-screen h2 {
      font-size: 18px;
      color: #e74c3c;
      margin-bottom: 8px;
    }

    .error-screen p {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    .retry-btn {
      margin-top: 20px;
      padding: 12px 32px;
      background: #06C755;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .init-loading {
      text-align: center;
      padding: 40px 20px;
    }

    .init-loading p {
      font-size: 14px;
      color: #888;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 初期化中 -->
    <div id="initLoading" class="init-loading">
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>

    <!-- フォーム -->
    <div id="formSection" style="display:none;">
      <div class="header">
        <h1>お客様情報登録</h1>
        <p>以下の情報をご入力ください</p>
      </div>

      <div class="form-group">
        <label for="customerName">お名前<span class="required">必須</span></label>
        <input type="text" id="customerName" placeholder="例：山田 太郎" autocomplete="name">
        <div class="error-message" id="nameError">お名前を入力してください</div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">電話番号<span class="required">必須</span></label>
        <input type="tel" id="phoneNumber" placeholder="例：090-1234-5678" autocomplete="tel">
        <div class="error-message" id="phoneError">正しい電話番号を入力してください</div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitForm()">登録する</button>
    </div>

    <!-- 送信中 -->
    <div id="loadingSection" class="loading">
      <div class="spinner"></div>
      <p>送信中...</p>
    </div>

    <!-- 完了 -->
    <div id="completeSection" class="complete">
      <div class="complete-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2>登録が完了しました</h2>
      <p>ありがとうございます。<br>このウィンドウは閉じていただいて構いません。</p>
    </div>

    <!-- エラー -->
    <div id="errorSection" class="error-screen">
      <h2>送信に失敗しました</h2>
      <p>通信エラーが発生しました。<br>もう一度お試しください。</p>
      <button class="retry-btn" onclick="retry()">もう一度試す</button>
    </div>
  </div>

  <script>
    // ====== 設定 ======
    const LIFF_ID = '2009316108-xJAGVyVI';
    const WEBHOOK_URL = 'https://hook.us2.make.com/uu3l3hloy9p68dzi75u1e8kyjp0nfnar'; // Make Webhook URLに差し替え

    // ====== 状態 ======
    let lineUserId = '';
    let lineDisplayName = '';

    // ====== LIFF初期化 ======
    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        document.getElementById('initLoading').style.display = 'none';
        document.getElementById('formSection').style.display = 'block';

      } catch (error) {
        console.error('LIFF初期化エラー:', error);
        document.getElementById('initLoading').style.display = 'none';
        document.getElementById('errorSection').classList.add('show');
      }
    }

    // ====== バリデーション ======
    function validateForm() {
      let isValid = true;
      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('phoneNumber').value.trim();

      // 名前チェック
      if (!name) {
        document.getElementById('customerName').classList.add('error');
        document.getElementById('nameError').classList.add('show');
        isValid = false;
      } else {
        document.getElementById('customerName').classList.remove('error');
        document.getElementById('nameError').classList.remove('show');
      }

      // 電話番号チェック（ハイフンありなし両対応、10〜13桁）
      const phoneClean = phone.replace(/[-\s]/g, '');
      if (!phoneClean || !/^\d{10,13}$/.test(phoneClean)) {
        document.getElementById('phoneNumber').classList.add('error');
        document.getElementById('phoneError').classList.add('show');
        isValid = false;
      } else {
        document.getElementById('phoneNumber').classList.remove('error');
        document.getElementById('phoneError').classList.remove('show');
      }

      return isValid;
    }

    // ====== フォーム送信 ======
    async function submitForm() {
      if (!validateForm()) return;

      const name = document.getElementById('customerName').value.trim();
      const phone = document.getElementById('phoneNumber').value.trim();
      // ハイフンを除去して統一
      const phoneClean = phone.replace(/[-\s]/g, '');

      // UI切り替え
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('loadingSection').classList.add('show');

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            line_user_id: lineUserId,
            line_display_name: lineDisplayName,
            customer_name: name,
            phone_number: phoneClean
          })
        });

        if (!response.ok) throw new Error('送信失敗');

        // 完了画面
        document.getElementById('loadingSection').classList.remove('show');
        document.getElementById('completeSection').classList.add('show');

        // 3秒後に自動で閉じる
        setTimeout(() => {
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        }, 3000);

      } catch (error) {
        console.error('送信エラー:', error);
        document.getElementById('loadingSection').classList.remove('show');
        document.getElementById('errorSection').classList.add('show');
      }
    }

    // ====== リトライ ======
    function retry() {
      document.getElementById('errorSection').classList.remove('show');
      document.getElementById('formSection').style.display = 'block';
    }

    // ====== 入力時エラー解除 ======
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('customerName').addEventListener('input', function() {
        this.classList.remove('error');
        document.getElementById('nameError').classList.remove('show');
      });
      document.getElementById('phoneNumber').addEventListener('input', function() {
        this.classList.remove('error');
        document.getElementById('phoneError').classList.remove('show');
      });
    });

    // ====== 開始 ======
    initializeLiff();
  </script>
</body>
</html>
